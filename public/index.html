<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concorrentes — Ricapet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F7F4;
    --surface: #FFFFFF;
    --surface-2: #F0F2ED;
    --border: #E4E7E0;
    --text: #1E2924;
    --muted: #74827A;
    --up: #1E9E74;
    --up-bg: #E4F5EE;
    --down: #D65F45;
    --down-bg: #FBEAE5;
    --you: #C98A2E;
    --you-bg: #FBF1E0;
    --shadow-sm: 0 1px 2px rgba(30, 41, 36, 0.05);
    --shadow-md: 0 4px 16px rgba(30, 41, 36, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

  header {
    padding: 28px clamp(16px, 4vw, 48px) 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.02em;
  }

  header h1 span { color: var(--muted); font-weight: 400; }

  nav.view-tabs {
    display: flex;
    gap: 4px;
    padding: 0 clamp(16px, 4vw, 48px);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  nav.view-tabs button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }

  nav.view-tabs button.active {
    color: var(--text);
    border-bottom-color: var(--you);
  }

  .hist-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .hist-controls select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem;
  }

  .hist-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    background: var(--surface);
  }

  table.hist {
    font-size: 0.78rem;
  }

  table.hist th, table.hist td {
    white-space: nowrap;
  }

  table.hist th:first-child,
  table.hist td:first-child {
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 1;
    max-width: 220px;
    white-space: normal;
  }

  table.hist thead th:first-child { background: var(--surface-2); }

  table.hist tr.you td:first-child { background: var(--you-bg); }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--up);
    box-shadow: 0 0 0 0 rgba(30,158,116,0.6);
    animation: pulse 2.2s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(30,158,116,0.45); }
    70%  { box-shadow: 0 0 0 7px rgba(30,158,116,0); }
    100% { box-shadow: 0 0 0 0 rgba(30,158,116,0); }
  }

  main {
    padding: 24px clamp(16px, 4vw, 48px) 64px;
    max-width: 1080px;
    margin: 0 auto;
  }

  .cat-block {
    margin-bottom: 40px;
  }

  .cat-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .tables-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  @media (max-width: 800px) {
    .tables-row { grid-template-columns: 1fr; }
  }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  .table-card h3 {
    font-family: 'Space Grotesk', sans-serif;
    margin: 0;
    padding: 14px 18px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
  }

  th {
    text-align: left;
    padding: 10px 14px;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }

  tr.you td { background: var(--you-bg); }
  tr.you td:first-child { box-shadow: inset 3px 0 0 var(--you); }

  .empty, .loading, .error {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 40px 0;
    text-align: center;
  }

  .error { color: var(--down); }

  .comp-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .comp-pills button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.15s ease;
  }

  .comp-pills button.active {
    background: var(--you-bg);
    border-color: var(--you);
    color: #8A5D1E;
  }

  .comp-pills button:hover:not(.active) {
    border-color: var(--muted);
    color: var(--text);
  }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 26px;
  }

  @media (max-width: 700px) {
    .kpi-row { grid-template-columns: 1fr; }
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }

  .kpi-card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--you);
  }

  .kpi-card .kpi-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .kpi-card .kpi-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
  }

  .kpi-card .kpi-delta {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.76rem;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 9px;
    border-radius: 20px;
  }

  .kpi-delta.up { color: var(--up); background: var(--up-bg); }
  .kpi-delta.down { color: var(--down); background: var(--down-bg); }
  .kpi-delta.flat { color: var(--muted); background: var(--surface-2); }

  .trend {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.68rem;
    font-weight: 600;
    margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .trend.up { color: var(--up); background: var(--up-bg); }
  .trend.down { color: var(--down); background: var(--down-bg); }
  .trend.flat { color: var(--muted); background: var(--surface-2); }

  td.produto-cell {
    max-width: 320px;
    white-space: normal;
  }

  .produto-linha {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .produto-thumb {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--surface-2);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .produto-link {
    color: inherit;
    text-decoration: none;
  }

  .produto-link:hover {
    color: var(--accent, #1e5eff);
    text-decoration: underline;
  }

  .spark {
    display: inline-block;
    vertical-align: middle;
    margin-left: 8px;
  }

  .spark-wrap.up { color: var(--up); }
  .spark-wrap.down { color: var(--down); }
  .spark-wrap.flat { color: var(--muted); }

  .table-card h3 {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .prod-table tbody tr:hover td {
    background: var(--surface-2);
  }

  .metric-tabs {
    display: flex;
    gap: 4px;
    margin: 4px 0 16px;
    border-bottom: 1px solid var(--border);
  }

  .metric-tabs button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 8px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }

  .metric-tabs button.active {
    color: var(--text);
    border-bottom-color: var(--you);
  }
</style>
</head>
<body>

<header>
  <h1>Concorrentes <span>/ Ricapet</span></h1>
  <div class="status">
    <span class="dot"></span>
    <span id="lastUpdated">carregando…</span>
  </div>
</header>

<nav class="view-tabs">
  <button id="tabAtual" class="active" onclick="mostrarView('atual')">Snapshot atual</button>
  <button id="tabHistorico" onclick="mostrarView('historico')">Histórico</button>
  <button id="tabConcorrentes" onclick="mostrarView('concorrentes')">Concorrentes</button>
</nav>

<main id="content">
  <div class="loading">buscando último snapshot…</div>
</main>

<script>
let historicoCache = null;

function mostrarView(view) {
  document.getElementById('tabAtual').classList.toggle('active', view === 'atual');
  document.getElementById('tabHistorico').classList.toggle('active', view === 'historico');
  document.getElementById('tabConcorrentes').classList.toggle('active', view === 'concorrentes');
  if (view === 'atual') {
    loadData();
  } else if (view === 'historico') {
    loadHistorico();
  } else {
    loadConcorrentes();
  }
}

async function loadData() {
  const el = document.getElementById('content');
  const statusEl = document.getElementById('lastUpdated');
  el.innerHTML = '<div class="loading">buscando último snapshot…</div>';

  try {
    const res = await fetch('/api/concorrentes');
    if (!res.ok) {
      if (res.status === 404) {
        el.innerHTML = '<div class="empty">Nenhum dado coletado ainda. Rode o scraper local pra popular o painel.</div>';
        statusEl.textContent = 'sem dados';
        return;
      }
      throw new Error('erro ' + res.status);
    }
    const data = await res.json();
    render(data);
  } catch (err) {
    el.innerHTML = '<div class="error">Falha ao carregar: ' + err.message + '</div>';
    statusEl.textContent = 'erro';
  }
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
}

function fmtDiaCurto(diaISO) {
  // diaISO no formato YYYY-MM-DD -> DD/MM
  const [ano, mes, dia] = diaISO.split('-');
  return `${dia}/${mes}`;
}

function renderTable(rows) {
  if (!rows || rows.length === 0) {
    return '<div class="empty" style="padding:20px;">sem linhas</div>';
  }
  const headers = Object.keys(rows[0]).filter(h => !h.startsWith('_'));
  const isYouRow = (row) => row['_voce'] === true;

  let html = '<table><thead><tr>';
  headers.forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';

  rows.forEach(row => {
    const cls = isYouRow(row) ? ' class="you"' : '';
    html += `<tr${cls}>`;
    headers.forEach(h => {
      const val = row[h] ?? '';
      const numeric = /^[+\-]?\s?R?\$?\s?[\d.,]+%?$/.test(val);
      html += `<td class="${numeric ? 'num' : ''}">${val}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  return html;
}

function render(data) {
  const el = document.getElementById('content');
  const statusEl = document.getElementById('lastUpdated');
  statusEl.textContent = 'atualizado em ' + fmtDate(data.coletado_em);

  if (!data.categorias || data.categorias.length === 0) {
    el.innerHTML = '<div class="empty">Snapshot vazio.</div>';
    return;
  }

  let html = '';
  data.categorias.forEach(cat => {
    html += `<div class="cat-block">
      <h2 class="cat-title">${cat.subcategoria}</h2>
      <div class="tables-row">
        <div class="table-card">
          <h3>Sua posição</h3>
          ${renderTable(cat.sua_posicao)}
        </div>
        <div class="table-card">
          <h3>Melhores vendedores</h3>
          ${renderTable(cat.melhores_vendedores)}
        </div>
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

async function loadHistorico() {
  const el = document.getElementById('content');
  const statusEl = document.getElementById('lastUpdated');
  el.innerHTML = '<div class="loading">buscando histórico…</div>';

  try {
    if (!historicoCache) {
      const res = await fetch('/api/concorrentes?action=historico');
      if (!res.ok) throw new Error('erro ' + res.status);
      historicoCache = await res.json();
    }
    renderHistorico(historicoCache);
    statusEl.textContent = historicoCache.datas.length + ' dia(s) registrados';
  } catch (err) {
    el.innerHTML = '<div class="error">Falha ao carregar histórico: ' + err.message + '</div>';
    statusEl.textContent = 'erro';
  }
}

function renderHistorico(data) {
  const el = document.getElementById('content');
  const { datas, subcategorias } = data;

  if (!datas || datas.length === 0) {
    el.innerHTML = '<div class="empty">Ainda não há histórico suficiente (precisa de pelo menos 1 dia coletado).</div>';
    return;
  }

  const nomesSub = Object.keys(subcategorias);
  if (nomesSub.length === 0) {
    el.innerHTML = '<div class="empty">Sem dados de posição no histórico.</div>';
    return;
  }

  let html = '';
  nomesSub.forEach((subNome, idx) => {
    const vendedores = subcategorias[subNome];
    const nomesVendedor = Object.keys(vendedores);

    // ordena pela posição mais recente (menor primeiro), você sempre no topo
    const ultimaData = datas[datas.length - 1];
    nomesVendedor.sort((a, b) => {
      const posA = parseInt(vendedores[a][ultimaData], 10);
      const posB = parseInt(vendedores[b][ultimaData], 10);
      if (isNaN(posA)) return 1;
      if (isNaN(posB)) return -1;
      return posA - posB;
    });

    const selectId = `sel-${idx}`;

    html += `<div class="cat-block">
      <h2 class="cat-title">${subNome}</h2>
      <div class="hist-controls">
        <span>${nomesVendedor.length} vendedor(es) · ${datas.length} dia(s)</span>
      </div>
      <div class="hist-table-wrap">
        <table class="hist">
          <thead><tr><th>Vendedor</th>`;

    datas.forEach(d => html += `<th class="num">${fmtDiaCurto(d)}</th>`);
    html += '</tr></thead><tbody>';

    nomesVendedor.forEach(nome => {
      const ehVoce = /RICAPET|VOC[EÊ]/i.test(nome);
      html += `<tr${ehVoce ? ' class="you"' : ''}><td>${nome}</td>`;
      datas.forEach(d => {
        const pos = vendedores[nome][d];
        html += `<td class="num">${pos !== undefined ? pos : '—'}</td>`;
      });
      html += '</tr>';
    });

    html += '</tbody></table></div></div>';
  });

  el.innerHTML = html;
}

let concorrentesSnapshotCache = null;
let concorrentesHistoricoCache = null;
let concorrenteAtivoNome = null;
let metricaAtivaConcorrente = 'vendas_brutas';

const METRICAS_CONCORRENTE = [
  { key: 'vendas_brutas', label: 'Vendas brutas' },
  { key: 'quantidade_de_vendas', label: 'Quantidade' },
  { key: 'visitas', label: 'Visitas' },
  { key: 'conversao', label: 'Conversão' },
];

function selecionarMetricaConcorrente(key) {
  metricaAtivaConcorrente = key;
  renderPainelConcorrentes();
}

async function loadConcorrentes() {
  const el = document.getElementById('content');
  const statusEl = document.getElementById('lastUpdated');
  el.innerHTML = '<div class="loading">buscando dados dos concorrentes…</div>';

  try {
    if (!concorrentesSnapshotCache) {
      const res = await fetch('/api/concorrentes');
      if (res.ok) concorrentesSnapshotCache = await res.json();
    }
    if (!concorrentesHistoricoCache) {
      const res2 = await fetch('/api/concorrentes?action=historico_concorrentes');
      if (res2.ok) concorrentesHistoricoCache = await res2.json();
    }
    renderPainelConcorrentes();
    if (concorrentesHistoricoCache) {
      statusEl.textContent = concorrentesHistoricoCache.datas.length + ' dia(s) registrados';
    }
  } catch (err) {
    el.innerHTML = '<div class="error">Falha ao carregar concorrentes: ' + err.message + '</div>';
    statusEl.textContent = 'erro';
  }
}

function selecionarConcorrente(nome) {
  concorrenteAtivoNome = nome;
  renderPainelConcorrentes();
}

// Converte texto tipo "+ R$ 16.600" ou "10,7%" ou "+ 240" em número
function parseNumero(str) {
  if (str === undefined || str === null) return null;
  let s = String(str).trim();
  if (s === '' || s === '—') return null;
  const negativo = /^-/.test(s);
  s = s.replace(/^[+\-]\s?/, '');
  s = s.replace(/R\$\s?/g, '').replace(/%/g, '');
  s = s.replace(/\./g, '').replace(/,/g, '.');
  const n = parseFloat(s);
  if (isNaN(n)) return null;
  return negativo ? -n : n;
}

function calcDelta(valorAntigo, valorNovo) {
  if (valorAntigo === null || valorNovo === null) return null;
  if (valorAntigo === 0) return valorNovo === 0 ? 0 : null;
  return ((valorNovo - valorAntigo) / valorAntigo) * 100;
}

function trendHTML(delta, eraZero) {
  if (delta === null) {
    return eraZero ? '<span class="trend up">▲ novo</span>' : '';
  }
  const arrow = delta > 0.5 ? '▲' : delta < -0.5 ? '▼' : '▪';
  const cls = delta > 0.5 ? 'up' : delta < -0.5 ? 'down' : 'flat';
  const texto = (delta > 0 ? '+' : '') + delta.toFixed(1) + '%';
  return `<span class="trend ${cls}">${arrow} ${texto}</span>`;
}

function renderTabelaMetrica(nomesProdutoHist, produtosHist, datas, metricKey) {
  const nomes = [...nomesProdutoHist];
  const ultimaData = datas[datas.length - 1];
  nomes.sort((a, b) => {
    const va = parseNumero((produtosHist[a][ultimaData] || {})[metricKey]);
    const vb = parseNumero((produtosHist[b][ultimaData] || {})[metricKey]);
    return (vb || 0) - (va || 0);
  });

  let html = '<div class="hist-table-wrap"><table class="hist"><thead><tr><th>Produto</th>';
  datas.forEach(d => html += `<th class="num">${fmtDiaCurto(d)}</th>`);
  html += '</tr></thead><tbody>';

  nomes.forEach(nome => {
    // procura a imagem e o link mais recentes disponíveis (do dia mais novo pro mais antigo)
    let imagemUrl = null;
    let linkUrl = null;
    for (let i = datas.length - 1; i >= 0; i--) {
      const reg = (produtosHist[nome] || {})[datas[i]];
      if (reg && reg.imagem && !imagemUrl) imagemUrl = reg.imagem;
      if (reg && reg.link && !linkUrl) linkUrl = reg.link;
      if (imagemUrl && linkUrl) break;
    }
    const thumbHtml = imagemUrl
      ? `<img class="produto-thumb" src="${imagemUrl}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="produto-thumb"></div>`;
    const nomeHtml = linkUrl
      ? `<a class="produto-link" href="${linkUrl}" target="_blank" rel="noopener noreferrer">${nome}</a>`
      : `<span>${nome}</span>`;

    html += `<tr><td class="produto-cell"><div class="produto-linha">${thumbHtml}${nomeHtml}</div></td>`;
    let valorAnterior = null;
    datas.forEach(d => {
      const registro = (produtosHist[nome] || {})[d];
      const bruto = registro ? registro[metricKey] : undefined;
      const valorNum = parseNumero(bruto);
      let seta = '';
      if (valorAnterior !== null) {
        seta = trendHTML(calcDelta(valorAnterior, valorNum), valorAnterior === 0);
      }
      html += `<td class="num">${bruto !== undefined && bruto !== null ? bruto : '—'}${seta}</td>`;
      if (valorNum !== null) valorAnterior = valorNum;
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

function sparklineSVG(valores, width, height) {
  width = width || 90;
  height = height || 26;
  const vals = valores.filter(v => v !== null && v !== undefined);
  if (vals.length < 2) return '';
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const range = (max - min) || 1;
  const stepX = width / (valores.length - 1);
  let ultimoY = height / 2;
  const pontos = valores.map((v, i) => {
    const x = i * stepX;
    const y = (v === null || v === undefined) ? ultimoY : height - ((v - min) / range) * height;
    ultimoY = y;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class="spark" viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" preserveAspectRatio="none">
    <polyline points="${pontos}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function acharChave(obj, testFn) {
  return Object.keys(obj).find(testFn) || null;
}

function extrairMetricasSnapshot(produto) {
  const vendasKey = acharChave(produto, k => k.toLowerCase().includes('venda') && k.toLowerCase().includes('brut'));
  const qtdKey = acharChave(produto, k => k.toLowerCase().includes('quantidade'));
  const visitasKey = acharChave(produto, k => k.toLowerCase().includes('visita'));
  const conversaoKey = acharChave(produto, k => k.toLowerCase().includes('convers'));
  const anuncioKey = acharChave(produto, k => k.toLowerCase().includes('núncio') || k.toLowerCase().includes('anuncio'));

  return {
    nome: anuncioKey ? produto[anuncioKey] : Object.values(produto)[0],
    vendas_brutas: vendasKey ? produto[vendasKey] : null,
    quantidade_de_vendas: qtdKey ? produto[qtdKey] : null,
    visitas: visitasKey ? produto[visitasKey] : null,
    conversao: conversaoKey ? produto[conversaoKey] : null,
    imagem: produto._imagem || null,
  };
}

function kpiCard(label, valorHoje, valorOntem, temOntem, prefixo, serie) {
  let deltaHtml = '<div class="kpi-delta flat">aguardando 2º dia p/ comparar</div>';
  let corTendencia = 'flat';
  if (temOntem) {
    const delta = calcDelta(valorOntem, valorHoje);
    if (delta === null) {
      deltaHtml = '<div class="kpi-delta up">▲ novo</div>';
      corTendencia = 'up';
    } else {
      const cls = delta > 0.5 ? 'up' : delta < -0.5 ? 'down' : 'flat';
      const arrow = delta > 0.5 ? '▲' : delta < -0.5 ? '▼' : '▪';
      deltaHtml = `<div class="kpi-delta ${cls}">${arrow} ${(delta > 0 ? '+' : '')}${delta.toFixed(1)}% vs dia anterior</div>`;
      corTendencia = cls;
    }
  }
  const sparkHtml = serie && serie.length >= 2
    ? `<span class="spark-wrap ${corTendencia}">${sparklineSVG(serie)}</span>`
    : '';
  return `<div class="kpi-card">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value" style="display:flex;align-items:center;justify-content:space-between;">
      <span>${prefixo}${Math.round(valorHoje).toLocaleString('pt-BR')}</span>
      ${sparkHtml}
    </div>
    ${deltaHtml}
  </div>`;
}

function renderPainelConcorrentes() {
  const el = document.getElementById('content');
  const snapshot = concorrentesSnapshotCache;
  const historico = concorrentesHistoricoCache;
  const concorrentesAtuais = (snapshot && snapshot.concorrentes) || [];
  const historicoMap = (historico && historico.concorrentes) || {};
  const datas = (historico && historico.datas) || [];

  const nomes = Array.from(new Set([
    ...concorrentesAtuais.map(c => c.nome),
    ...Object.keys(historicoMap),
  ]));

  if (nomes.length === 0) {
    el.innerHTML = '<div class="empty">Nenhum concorrente coletado ainda.</div>';
    return;
  }

  if (!concorrenteAtivoNome || !nomes.includes(concorrenteAtivoNome)) {
    concorrenteAtivoNome = nomes[0];
  }

  let pillsHtml = '<div class="comp-pills">';
  nomes.forEach(n => {
    const ativo = n === concorrenteAtivoNome ? ' active' : '';
    const nomeEscapado = n.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    pillsHtml += `<button class="${ativo}" data-nome="${nomeEscapado}">${n}</button>`;
  });
  pillsHtml += '</div>';

  const nome = concorrenteAtivoNome;
  const compAtual = concorrentesAtuais.find(c => c.nome === nome);
  const produtosAtuaisBrutos = compAtual ? compAtual.produtos : [];
  const produtosHist = historicoMap[nome] || {};
  const nomesProdutoHist = Object.keys(produtosHist);

  const ultimaData = datas[datas.length - 1];
  const penultimaData = datas.length > 1 ? datas[datas.length - 2] : null;
  const temOntem = !!penultimaData;

  let produtos;
  if (nomesProdutoHist.length > 0 && ultimaData) {
    produtos = nomesProdutoHist.map(p => ({
      nome: p,
      hoje: produtosHist[p][ultimaData] || {},
      ontem: penultimaData ? (produtosHist[p][penultimaData] || null) : null,
    }));
  } else {
    produtos = produtosAtuaisBrutos.map(p => {
      const m = extrairMetricasSnapshot(p);
      return { nome: m.nome, hoje: m, ontem: null };
    });
  }

  // calcula delta de vendas brutas pra ordenar por crescimento
  produtos.forEach(p => {
    const vHoje = parseNumero(p.hoje.vendas_brutas);
    const vOntem = p.ontem ? parseNumero(p.ontem.vendas_brutas) : null;
    p._vHoje = vHoje || 0;
    p._delta = (vOntem !== null && vHoje !== null) ? calcDelta(vOntem, vHoje) : null;
  });
  produtos.sort((a, b) => {
    if (a._delta === null && b._delta === null) return b._vHoje - a._vHoje;
    if (a._delta === null) return 1;
    if (b._delta === null) return -1;
    return b._delta - a._delta;
  });

  // KPIs agregados do concorrente inteiro (+ séries diárias pros sparklines)
  let somaVendasHoje = 0, somaVendasOntem = 0;
  let somaQtdHoje = 0, somaQtdOntem = 0;
  let somaVisitasHoje = 0, somaVisitasOntem = 0;
  produtos.forEach(p => {
    somaVendasHoje += parseNumero(p.hoje.vendas_brutas) || 0;
    somaQtdHoje += parseNumero(p.hoje.quantidade_de_vendas) || 0;
    somaVisitasHoje += parseNumero(p.hoje.visitas) || 0;
    if (p.ontem) {
      somaVendasOntem += parseNumero(p.ontem.vendas_brutas) || 0;
      somaQtdOntem += parseNumero(p.ontem.quantidade_de_vendas) || 0;
      somaVisitasOntem += parseNumero(p.ontem.visitas) || 0;
    }
  });

  const serieVendas = datas.map(d => {
    let soma = 0;
    nomesProdutoHist.forEach(p => { soma += parseNumero((produtosHist[p][d] || {}).vendas_brutas) || 0; });
    return soma;
  });
  const serieQtd = datas.map(d => {
    let soma = 0;
    nomesProdutoHist.forEach(p => { soma += parseNumero((produtosHist[p][d] || {}).quantidade_de_vendas) || 0; });
    return soma;
  });
  const serieVisitas = datas.map(d => {
    let soma = 0;
    nomesProdutoHist.forEach(p => { soma += parseNumero((produtosHist[p][d] || {}).visitas) || 0; });
    return soma;
  });

  let html = pillsHtml;
  html += `<div class="kpi-row">
    ${kpiCard('Vendas brutas (soma)', somaVendasHoje, somaVendasOntem, temOntem, 'R$ ', serieVendas)}
    ${kpiCard('Quantidade de vendas (soma)', somaQtdHoje, somaQtdOntem, temOntem, '', serieQtd)}
    ${kpiCard('Visitas (soma)', somaVisitasHoje, somaVisitasOntem, temOntem, '', serieVisitas)}
  </div>`;

  // monta uma estrutura produtosHist "efetiva" mesmo se só houver 1 dia
  // (usa o snapshot atual como único dia, pra reaproveitar a mesma tabela)
  let produtosHistEfetivo = produtosHist;
  let datasEfetivas = datas;
  let nomesProdutoEfetivo = nomesProdutoHist;
  if (nomesProdutoHist.length === 0 && produtosAtuaisBrutos.length > 0) {
    const hojeLabel = new Date().toISOString().slice(0, 10);
    produtosHistEfetivo = {};
    produtosAtuaisBrutos.forEach(p => {
      const m = extrairMetricasSnapshot(p);
      produtosHistEfetivo[m.nome] = { [hojeLabel]: m };
    });
    datasEfetivas = [hojeLabel];
    nomesProdutoEfetivo = Object.keys(produtosHistEfetivo);
  }

  let metricTabsHtml = '<div class="metric-tabs">';
  METRICAS_CONCORRENTE.forEach(m => {
    const ativo = m.key === metricaAtivaConcorrente ? ' active' : '';
    metricTabsHtml += `<button class="${ativo}" data-metrica="${m.key}">${m.label}</button>`;
  });
  metricTabsHtml += '</div>';

  const metricaAtual = METRICAS_CONCORRENTE.find(m => m.key === metricaAtivaConcorrente) || METRICAS_CONCORRENTE[0];

  html += `<div class="table-card" style="background:transparent;border:none;">
    <h3 style="background:none;border:none;padding:0 0 4px;">Produtos por dia — ${metricaAtual.label} · ordem cronológica</h3>
    ${metricTabsHtml}
    ${renderTabelaMetrica(nomesProdutoEfetivo, produtosHistEfetivo, datasEfetivas, metricaAtivaConcorrente)}
  </div>`;

  if (!temOntem) {
    html += '<p style="color:var(--muted);font-size:0.82rem;margin-top:16px;">As setas de crescimento/queda em cada célula aparecem a partir do 2º dia de coleta.</p>';
  }

  el.innerHTML = html;

  // Rola a tabela de histórico até o final (dia mais recente), em vez de
  // deixar o usuário precisar arrastar do primeiro dia até o último.
  el.querySelectorAll('.hist-table-wrap').forEach(wrap => {
    wrap.scrollLeft = wrap.scrollWidth;
  });

  el.querySelectorAll('.comp-pills button').forEach(btn => {
    btn.addEventListener('click', () => selecionarConcorrente(btn.dataset.nome));
  });
  el.querySelectorAll('.metric-tabs button').forEach(btn => {
    btn.addEventListener('click', () => selecionarMetricaConcorrente(btn.dataset.metrica));
  });
}

loadData();
</script>

</html>
